[package]
name = "stryke-azure"
version = "0.6.0"
description = "Azure client (Blob Storage, Storage Queues, Cosmos DB, Key Vault Secrets, Entra identity) for stryke. cdylib loaded in-process — persistent tokio runtime + shared Entra credential."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-azure"
edition = "2026"

[ffi]
lib-name = "stryke_azure"
namespace = "Azure"
exports = [
    "azure__pkg_version",
    "azure__identity_token",
    "azure__blob_list_containers",
    "azure__blob_list_blobs",
    "azure__blob_get",
    "azure__blob_put",
    "azure__blob_delete",
    "azure__blob_properties",
    "azure__blob_create_container",
    "azure__blob_delete_container",
    "azure__blob_set_metadata",
    "azure__queue_list",
    "azure__queue_send",
    "azure__queue_receive",
    "azure__queue_delete_message",
    "azure__queue_clear",
    "azure__queue_properties",
    "azure__queue_create",
    "azure__queue_delete",
    "azure__cosmos_list_databases",
    "azure__cosmos_list_containers",
    "azure__cosmos_create_database",
    "azure__cosmos_create_container",
    "azure__cosmos_delete_database",
    "azure__cosmos_delete_container",
    "azure__cosmos_replace_item",
    "azure__cosmos_upsert_item",
    "azure__cosmos_read_item",
    "azure__cosmos_delete_item",
    "azure__cosmos_query",
    "azure__secrets_get",
    "azure__secrets_set",
    "azure__secrets_list",
    "azure__secrets_delete",
    "azure__secrets_list_versions",
    "azure__secrets_backup",
    "azure__keys_encrypt",
    "azure__keys_decrypt",
    "azure__parse_resource_id",
    "azure__build_resource_id",
    "azure__parse_connection_string",
    "azure__build_connection_string",
    "azure__parse_blob_uri",
    "azure__build_blob_uri",
    "azure__valid_storage_account_name",
    "azure__valid_container_name",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
