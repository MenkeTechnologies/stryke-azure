[package]
name = "stryke-azure"
version = "0.18.0"
description = "Azure client (Blob Storage, Storage Queues, Cosmos DB, Key Vault Secrets, Entra identity) for stryke. cdylib loaded in-process — persistent tokio runtime + shared Entra credential."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-azure"
edition = "2026"

[ffi]
lib-name = "stryke_azure"
namespace = "Azure"
exports = [
    "azure__pkg_version",
    "azure__identity_token",
    "azure__blob_list_containers",
    "azure__blob_list_blobs",
    "azure__blob_get",
    "azure__blob_put",
    "azure__blob_delete",
    "azure__blob_properties",
    "azure__blob_create_container",
    "azure__blob_delete_container",
    "azure__blob_set_metadata",
    "azure__queue_list",
    "azure__queue_send",
    "azure__queue_receive",
    "azure__queue_delete_message",
    "azure__queue_clear",
    "azure__queue_properties",
    "azure__queue_create",
    "azure__queue_delete",
    "azure__cosmos_list_databases",
    "azure__cosmos_list_containers",
    "azure__cosmos_create_database",
    "azure__cosmos_create_container",
    "azure__cosmos_delete_database",
    "azure__cosmos_delete_container",
    "azure__cosmos_replace_item",
    "azure__cosmos_upsert_item",
    "azure__cosmos_read_item",
    "azure__cosmos_delete_item",
    "azure__cosmos_query",
    "azure__secrets_get",
    "azure__secrets_set",
    "azure__secrets_list",
    "azure__secrets_delete",
    "azure__secrets_list_versions",
    "azure__secrets_backup",
    "azure__keys_encrypt",
    "azure__keys_decrypt",
    "azure__keys_list",
    "azure__keys_get",
    "azure__resource_groups_list",
    "azure__resource_group_get",
    "azure__resource_group_create",
    "azure__resource_group_delete",
    "azure__vm_list",
    "azure__vm_get",
    "azure__vm_start",
    "azure__vm_stop",
    "azure__vm_deallocate",
    "azure__vm_restart",
    "azure__vm_instance_view",
    "azure__compute_skus",
    "azure__storage_accounts_list",
    "azure__storage_account_get",
    "azure__storage_account_list_keys",
    "azure__servicebus_list_queues",
    "azure__servicebus_list_topics",
    "azure__servicebus_list_namespaces",
    "azure__servicebus_send_message",
    "azure__servicebus_receive_message",
    "azure__monitor_list_metrics",
    "azure__container_groups_list",
    "azure__container_group_get",
    "azure__aks_list",
    "azure__aks_get",
    "azure__aks_list_node_pools",
    "azure__subscriptions_list",
    "azure__locations_list",
    "azure__resources_list",
    "azure__parse_resource_id",
    "azure__resource_id_parent",
    "azure__build_resource_id",
    "azure__parse_connection_string",
    "azure__build_connection_string",
    "azure__redact_connection_string",
    "azure__parse_blob_uri",
    "azure__build_blob_uri",
    "azure__storage_endpoint",
    "azure__parse_storage_endpoint",
    "azure__valid_storage_account_name",
    "azure__valid_container_name",
    "azure__valid_blob_name",
    "azure__valid_keyvault_secret_name",
    "azure__valid_queue_name",
    "azure__valid_table_name",
    "azure__valid_cosmos_id",
    "azure__valid_guid",
    "azure__normalize_guid",
    "azure__format_guid",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
